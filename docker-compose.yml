services:
  postgres:
    image: postgres:16-alpine
    container_name: deepfakeguard-postgres
    environment:
      POSTGRES_USER: deepfake
      POSTGRES_PASSWORD: deepfake
      POSTGRES_DB: deepfakeguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfake -d deepfakeguard"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deepfakeguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: deepfakeguard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: deepfakeguard-api
    environment:
      DATABASE_URL: postgresql+asyncpg://deepfake:deepfake@postgres:5432/deepfakeguard
      DATABASE_URL_SYNC: postgresql+psycopg2://deepfake:deepfake@postgres:5432/deepfakeguard
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-to-a-random-secret-key
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: videos
      MINIO_SECURE: "false"
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: deepfakeguard-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://deepfake:deepfake@postgres:5432/deepfakeguard
      DATABASE_URL_SYNC: postgresql+psycopg2://deepfake:deepfake@postgres:5432/deepfakeguard
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: videos
      MINIO_SECURE: "false"
    volumes:
      - ./src:/app/src
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data: